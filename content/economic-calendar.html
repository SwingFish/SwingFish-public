<div class="container py-4">
	<header class="sf2-post-header">
		<nav aria-label="breadcrumb">
			<ol class="breadcrumb">
				<li class="breadcrumb-item"><a href="/">Home</a></li>
				<li class="breadcrumb-item"><a href="/news">News</a></li>
				<li class="breadcrumb-item active" aria-current="page">Economic Calendar</li>
			</ol>
		</nav>
		<h1 class="sf2-page-title">Economic Calendar (g)</h1>
	</header>

	<div class="d-flex flex-wrap gap-2 align-items-center mb-3">
		<a href="/news" class="btn sf2-btn-primary">Check News Section for Updates</a>
		<button type="button" class="btn sf2-btn-outline" onclick="popUp('https://www.swingfish.trade/lib/ajax/myfxbook_ec_popup.php')">Open Calendar in Popup Window</button>
	</div>

	<div class="sf2-alert">
		<!-- myfxbook.com economic calendar widget - Start -->
		<script class="powered" type="text/javascript" src="https://widgets.myfxbook.com/scripts/fxCalendar.js"></script>
		<div style="color: #706f6f;font-weight: bold;font-size: 11px;font-family: Tahoma;">Powered by <a href="https://www.myfxbook.com" class="myfxbookLink"><b style="color: #575454;">Myfxbook.com</b></a></div>
		<script type="text/javascript">showCalendarWidget()</script>
		<script>setTimeout(function(){ var f = document.querySelector('.sf2-alert iframe'); if(f) f.style.height = '600px'; }, 1000);</script>
		<!-- myfxbook.com economic calendar widget - End -->
	</div>

</div>

<script type="text/javascript">
function popUp(URL) {
	var day = new Date();
	var id = day.getTime();
	window["page" + id] = window.open(URL, '' + id, 'toolbar=0,scrollbars=0,location=0,statusbar=0,menubar=0,resizable=1,width=900,height=450');
}
</script>
